<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Google Login on GitHub Pages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff7ed;
            color: #1f2937;
            padding: 40px;
            text-align: center;
        }

        .card {
            max-width: 520px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 6px solid #f97316;
        }

        #protectedContent {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #fffbeb;
            border-radius: 14px;
            border: 1px solid #fed7aa;
        }

        #loginStatus {
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #7c2d12;
            font-size: 0.95rem;
            display: none;
        }

        .small-note {
            margin-top: 14px;
            color: #6b7280;
            font-size: 0.9rem;
        }

        button {
            margin-top: 20px;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #ea580c;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Programmers Picnic Login</h1>
        <p>Sign in with Google to continue.</p>

        <div id="g_id_onload" data-client_id="704346946203-m69uok3l8htbtgdsee0vtoul5b8v7clv.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with"
            data-shape="pill" data-logo_alignment="left">
        </div>

        <div id="loginStatus"></div>

        <p class="small-note">
            Access is checked from the hosted users.json file.
        </p>

        <div id="protectedContent">
            <h2 id="welcomeText"></h2>
            <p>You are now logged in.</p>
            <p>This content is visible only after Google login.</p>

            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const USERS_JSON_URL = "https://programmer-s-picnic.github.io/json-images/links/users.json";

        function setStatus(message, type = "info") {
            const status = document.getElementById("loginStatus");
            status.style.display = "block";
            status.textContent = message;

            if (type === "error") {
                status.style.background = "#fef2f2";
                status.style.borderColor = "#fecaca";
                status.style.color = "#991b1b";
            } else if (type === "success") {
                status.style.background = "#f0fdf4";
                status.style.borderColor = "#bbf7d0";
                status.style.color = "#166534";
            } else {
                status.style.background = "#fff7ed";
                status.style.borderColor = "#fed7aa";
                status.style.color = "#7c2d12";
            }
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(
                atob(base64)
                    .split('')
                    .map(function (c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    })
                    .join('')
            );

            return JSON.parse(jsonPayload);
        }

        async function getAllowedEmails() {
            const response = await fetch(USERS_JSON_URL, {
                method: "GET",
                cache: "no-store"
            });

            if (!response.ok) {
                throw new Error("Could not load users.json. HTTP status: " + response.status);
            }

            const data = await response.json();

            if (!Array.isArray(data)) {
                throw new Error("users.json must be a JSON array of email addresses.");
            }

            return data.map(function (email) {
                return String(email).trim().toLowerCase();
            });
        }

        async function handleCredentialResponse(response) {
            try {
                setStatus("Checking your access...");

                const user = parseJwt(response.credential);
                const allowedEmails = await getAllowedEmails();
                const userEmail = String(user.email || "").trim().toLowerCase();

                console.log("Google user:", user);

                if (!allowedEmails.includes(userEmail)) {
                    localStorage.removeItem("google_user");
                    setStatus("Sorry, this email is not allowed: " + userEmail, "error");
                    return;
                }

                localStorage.setItem("google_user", JSON.stringify(user));
                showUser(user);
                setStatus("Login successful.", "success");
            } catch (error) {
                console.error(error);
                localStorage.removeItem("google_user");
                setStatus("Login check failed. Please check users.json and try again.", "error");
            }
        }

        function showUser(user) {
            document.getElementById("protectedContent").style.display = "block";
            document.getElementById("welcomeText").innerText =
                "Welcome, " + (user.name || user.email);
        }

        function logout() {
            localStorage.removeItem("google_user");

            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }

            location.reload();
        }

        window.onload = async function () {
            const savedUser = localStorage.getItem("google_user");

            if (!savedUser) {
                return;
            }

            try {
                const user = JSON.parse(savedUser);
                const allowedEmails = await getAllowedEmails();
                const userEmail = String(user.email || "").trim().toLowerCase();

                if (allowedEmails.includes(userEmail)) {
                    showUser(user);
                    setStatus("You are already logged in.", "success");
                } else {
                    localStorage.removeItem("google_user");
                    setStatus("Your saved login is no longer allowed.", "error");
                }
            } catch (error) {
                console.error(error);
                localStorage.removeItem("google_user");
                setStatus("Could not verify saved login. Please sign in again.", "error");
            }
        };
    </script>

</body>

</html>
