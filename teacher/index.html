
<!DOCTYPE html>

<html>
<head>
<title>Teacher Portal</title>
<script>
async function login(){
let pass=document.getElementById("p").value;
let hash=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pass));
let hex=[...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');
fetch('../auth.json').then(r=>r.json()).then(d=>{
if(hex===d.password){
document.getElementById("main").style.display='block';
document.getElementById("login").style.display='none';
}else alert("Wrong");
});
}
</script>
<meta content="width=device-width,initial-scale=1" name="viewport"/><meta content="Teacher Portal - AI-ML learning resource by Programmer's Picnic." name="description"/><link href="../assets/css/site.css" rel="stylesheet"/><script defer="defer" src="../assets/js/site.js"></script><script defer="defer" src="../assets/js/include.js"></script></head>
<body><div data-include="header"></div><main class="pp-content" id="main-content">
<div id="login">
<input id="p" type="password"/>
<button onclick="login()">Login</button>
</div>
