
<!DOCTYPE html>
<html>
<head>
<title>Teacher Portal</title>
<script>
async function login(){
let pass=document.getElementById("p").value;
let hash=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pass));
let hex=[...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');
fetch('../auth.json').then(r=>r.json()).then(d=>{
if(hex===d.password){
document.getElementById("main").style.display='block';
document.getElementById("login").style.display='none';
}else alert("Wrong");
});
}
</script>
</head>
<body>

<div id="login">
<input id="p" type="password">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">
<h1>Teacher Panel</h1>
